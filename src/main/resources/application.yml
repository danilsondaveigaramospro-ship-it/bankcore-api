spring:
  application:
    name: bankcore-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bankcore}
    username: ${SPRING_DATASOURCE_USERNAME:bankcore}
    password: ${SPRING_DATASOURCE_PASSWORD:bankcore_dev_password}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

bankcore:
  jwt:
    secret: ${JWT_SECRET:change_me_use_very_long_secret_at_least_32_characters}
    access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:30}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  suspicious:
    large-transfer-threshold: 10000.00
    many-transfers-threshold: 5
    many-transfers-window-minutes: 10
    failed-attempts-threshold: 3
    failed-attempts-window-minutes: 15
    unusual-withdrawal-ratio: 0.50

logging:
  level:
    root: INFO
    com.bankcore: INFO
